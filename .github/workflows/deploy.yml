name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (uv)
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Export Marimo notebooks
        run: |
          uv sync
          uv run marimo export html-wasm content/notebooks/local_tiny.py -o public/notebooks/local_tiny --mode run
      - name: Copy notebook public assets
        run: |
          mkdir -p public/notebooks/local_tiny/public
          cp -r content/notebooks/public/. public/notebooks/local_tiny/public/

      - name: Install, build, and upload
        uses: withastro/action@v5
        with:
          path: .
          node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
