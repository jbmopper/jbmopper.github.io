name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps and test
        run: |
          npm ci
          npm run test

      - name: Set up Python (uv)
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Python deps and pytest
        run: |
          uv sync
          uv run pytest -v

      - name: Marimo check
        run: |
          for f in content/notebooks/*/*.py; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            uv run marimo check "$f" || exit 1
          done

      - name: Export Marimo notebooks
        run: bash scripts/export-notebooks.sh

      - name: Verify exports
        run: npm run verify-exports

      - name: Install, build, and upload
        uses: withastro/action@v5
        with:
          path: .
          node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
